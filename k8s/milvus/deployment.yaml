# Source: milvus/templates/milvus-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: milvus-standalone
  labels:
    app.kubernetes.io/name: milvus
    app.kubernetes.io/component: standalone
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: milvus
      app.kubernetes.io/component: standalone
  template:
    metadata:
      labels:
        app.kubernetes.io/name: milvus
        app.kubernetes.io/component: standalone
    spec:
      securityContext:
        seccompProfile:
          type: Unconfined
      containers:
        - name: milvus
          image: "milvusdb/milvus:v3.0-beta"
          imagePullPolicy: IfNotPresent
          command: ["milvus", "run", "standalone"]
          env:
            - name: ETCD_ENDPOINTS
              value: milvus-etcd:2379
            - name: MINIO_ADDRESS
              value: milvus-minio:9000
            - name: MQ_TYPE
              value: woodpecker
          ports:
            - containerPort: 19530
              name: grpc
            - containerPort: 9091
              name: http
          volumeMounts:
            - name: data
              mountPath: /var/lib/milvus
          resources:
            limits:
              cpu: 2000m
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 20
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: milvus-standalone-pvc
